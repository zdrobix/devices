<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
  <div class="container" style="max-width: 300px;">
    <h1 class="text-center mb-4">Sign up</h1>
    <form #form="ngForm" (ngSubmit)="onFormSubmit()">
      <div>
        <div class="mb-3">
          <input type="text" class="form-control" id="createUserUsername" name="createUserUsername" placeholder="Username"
            required [(ngModel)]="model.name" />
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" id="createUserRole" name="createUserRole" placeholder="Role"
            required [(ngModel)]="model.role" />
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" id="createUserLocation" name="createUserLocation" placeholder="Location"
            required [(ngModel)]="model.location" />
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" id="createUserPassword" name="createUserPassword" placeholder="Password"
            required [(ngModel)]="model.password" />
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Sign up</button>
        </div>
         <div class="mt-3 text-center">
          <a routerLink="/login">Already have an account? Log in</a>
        </div>
      </div>
    </form>
  </div>
</div>
